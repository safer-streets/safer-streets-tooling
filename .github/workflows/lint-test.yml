name: Lint and Test

on:
  push:
    branches: [ main ]
    tags: '**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v6
    - name: "Setup uv ${{ matrix.python-version }} / ${{ matrix.os }}"
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build
      run: |
        uv sync --group dev
    - name: Lint
      run: |
        uv run ruff check
        uv run ty check
    - name: Test
      env:
        # needs to be set, but doesn't need to be valid for running tests
        SAFER_STREETS_DATA_DIR: ""
      run: |
        uv run pytest
    # Build wheel and publish artefact (linux only)
    - name: Build wheel
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: uv build --wheel
    - name: Upload wheel artifact
      if: ${{ matrix.os == 'ubuntu-latest' }}
      uses: actions/upload-artifact@v6
      with:
        name: dist-wheel-${{ matrix.os }}-${{ matrix.python-version }}
        path: dist/*
        if-no-files-found: error
    - name: Upload coverage report
      if: ${{ matrix.os == 'ubuntu-latest' }}
      uses: actions/upload-artifact@v6
      with:
        name: coverage-html-${{ matrix.os }}-${{ matrix.python-version }}
        path: htmlcov/